services:
  nginx:
    image: nginx:1.27
    container_name: reverse-proxy
    restart: always

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/pcpartsmaroc/certbot/conf:/etc/letsencrypt:ro
      - /opt/pcpartsmaroc/certbot/www:/var/www/certbot:ro
    networks:
      - web-network

networks:
  web-network:
    external: true