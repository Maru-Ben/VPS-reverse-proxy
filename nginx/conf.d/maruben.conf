server {
    listen 80;
    server_name maruben.com www.maruben.com;

    location / {
        return 301 https://maruben.com$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name maruben.com www.maruben.com;

    ssl_certificate /etc/nginx/certs/maruben-origin.pem;
    ssl_certificate_key /etc/nginx/certs/maruben-origin.key;

    location / {
        proxy_pass http://maruben-nginx:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
    }
}