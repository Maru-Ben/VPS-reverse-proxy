# HTTP: keep ACME challenge reachable, redirect everything else to HTTPS
server {
    listen 80;
    server_name pcpartsmaroc.com www.pcpartsmaroc.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://pcpartsmaroc.com$request_uri;
    }
}

# HTTPS: terminate TLS here, then forward to the internal app nginx
server {
    listen 443 ssl;
    http2 on;
    server_name pcpartsmaroc.com www.pcpartsmaroc.com;

    ssl_certificate /etc/letsencrypt/live/pcpartsmaroc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pcpartsmaroc.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;
    gzip_min_length 1000;

    location / {
        proxy_pass http://pcpartsmaroc-nginx:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_redirect off;
    }
}